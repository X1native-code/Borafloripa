<style>
:root {
  /* tokens — overridden by paleta tweak */
  --cream: #F7F1E3;
  --cream-soft: #FBF7EC;
  --ink: #0E1B2C;
  --ink-soft: #2A3A50;
  --muted: #6E7686;
  --line: #E6DDC6;
  --line-soft: #EFE7D3;
  --paper: #FFFFFF;

  --turq: #00B5B0;
  --turq-deep: #008A87;
  --coral: #FF6A4D;
  --coral-deep: #E94F30;
  --sun: #FFC42F;
  --moss: #2D6B3A;
  --sky: #4FB7E8;

  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  --shadow-sm: 0 1px 2px rgba(14,27,44,.05), 0 0 0 1px rgba(14,27,44,.04);
  --shadow-md: 0 8px 24px -8px rgba(14,27,44,.15), 0 0 0 1px rgba(14,27,44,.04);
  --shadow-lg: 0 24px 48px -16px rgba(14,27,44,.18), 0 0 0 1px rgba(14,27,44,.05);

  --font-display: "Bricolage Grotesque", system-ui, sans-serif;
  --font-ui: "Geist", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --density: 1; /* tweakable */
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  color: var(--ink);
  background: var(--cream);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

img { max-width: 100%; display: block; }

/* utility */
.wrap { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.wrap-wide { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 24px; }
@media (max-width: 720px) { .wrap, .wrap-wide { padding: 0 16px; } }

.display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; line-height: 0.98; text-wrap: balance; }
.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

/* photo placeholder */
.ph {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-md);
  background: var(--line-soft);
  color: var(--ink);
  isolation: isolate;
}
.ph::before {
  content: "";
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    135deg,
    var(--ph-stripe-a, rgba(0,0,0,0.05)) 0px,
    var(--ph-stripe-a, rgba(0,0,0,0.05)) 8px,
    var(--ph-stripe-b, rgba(0,0,0,0.02)) 8px,
    var(--ph-stripe-b, rgba(0,0,0,0.02)) 16px
  );
  z-index: 0;
}
.ph-label {
  position: absolute;
  bottom: 10px; left: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  background: rgba(14,27,44,0.86);
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
  z-index: 2;
  letter-spacing: 0.02em;
  max-width: calc(100% - 20px);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.ph-label::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--sun);
  border-radius: 50%;
}
.ph-glyph {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  opacity: 0.5;
}

/* color variants for placeholders */
.ph-turq { background: #B7E8E6; --ph-stripe-a: rgba(0,138,135,0.18); --ph-stripe-b: rgba(0,138,135,0.06); }
.ph-coral { background: #FFD3C6; --ph-stripe-a: rgba(233,79,48,0.18); --ph-stripe-b: rgba(233,79,48,0.06); }
.ph-sun { background: #FFE9A8; --ph-stripe-a: rgba(180,130,0,0.18); --ph-stripe-b: rgba(180,130,0,0.06); }
.ph-moss { background: #C2DCC4; --ph-stripe-a: rgba(45,107,58,0.18); --ph-stripe-b: rgba(45,107,58,0.06); }
.ph-sky { background: #C7E6F6; --ph-stripe-a: rgba(36,120,170,0.18); --ph-stripe-b: rgba(36,120,170,0.06); }
.ph-ink { background: #243245; --ph-stripe-a: rgba(255,255,255,0.10); --ph-stripe-b: rgba(255,255,255,0.03); color: #fff; }

/* buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-ui); font-weight: 600;
  padding: 12px 18px;
  border-radius: 999px;
  transition: transform .08s ease, box-shadow .15s ease, background .15s;
  white-space: nowrap;
  font-size: 15px;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: var(--cream); }
.btn-primary:hover { background: #1a2a40; }
.btn-coral { background: var(--coral); color: #fff; }
.btn-coral:hover { background: var(--coral-deep); }
.btn-turq { background: var(--turq); color: #fff; }
.btn-turq:hover { background: var(--turq-deep); }
.btn-ghost { background: transparent; color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }
.btn-ghost:hover { background: rgba(14,27,44,0.04); }
.btn-lg { padding: 16px 24px; font-size: 16px; }
.btn-xl { padding: 18px 28px; font-size: 17px; }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  background: var(--paper);
  box-shadow: inset 0 0 0 1px var(--line);
  white-space: nowrap;
}

/* badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.badge-coral { background: var(--coral); color: #fff; }
.badge-sun { background: var(--sun); color: var(--ink); }
.badge-turq { background: var(--turq); color: #fff; }
.badge-ink { background: var(--ink); color: var(--cream); }
.badge-soft { background: var(--cream-soft); color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }

/* card */
.card {
  background: var(--paper);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: transform .15s ease, box-shadow .15s ease;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

/* star */
.stars { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; }
.stars svg { color: var(--sun); }

/* layout */
section { position: relative; }

/* hash-route page wrapper */
.page { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* nav-active link underline */
.nav-link { position: relative; padding: 6px 2px; font-weight: 500; }
.nav-link.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px; background: var(--coral); border-radius: 2px; }

/* hide scrollbars on chip rows */
.hscroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.hscroll::-webkit-scrollbar { display: none; }

/* sticky search bar in hero */
.hero-search {
  background: var(--paper);
  border-radius: 999px;
  display: flex;
  align-items: stretch;
  padding: 6px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 720px;
}
@media (max-width: 720px) {
  .hero-search { border-radius: 18px; flex-direction: column; padding: 8px; }
}
.hero-search .field {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 999px;
  transition: background .15s;
}
@media (max-width: 720px) { .hero-search .field { border-radius: 12px; padding: 10px 14px; } }
.hero-search .field:hover { background: var(--cream-soft); }
.hero-search .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
.hero-search .field-value { font-size: 15px; font-weight: 500; color: var(--ink); }
.hero-search .field-value.placeholder { color: var(--muted); font-weight: 400; }
.hero-search .divider { width: 1px; background: var(--line-soft); margin: 8px 0; }
@media (max-width: 720px) { .hero-search .divider { display: none; } }

/* whatsapp fab */
.fab-wpp {
  position: fixed; bottom: 24px; right: 24px; z-index: 50;
  background: #25D366;
  color: #fff;
  border-radius: 999px;
  padding: 14px 18px;
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 600;
  box-shadow: 0 12px 32px -8px rgba(37,211,102,0.5), 0 0 0 1px rgba(0,0,0,0.04);
  transition: transform .15s;
}
.fab-wpp:hover { transform: translateY(-2px); }
@media (max-width: 720px) { .fab-wpp { bottom: 16px; right: 16px; padding: 12px 14px; } .fab-wpp .fab-label { display: none; } }

/* share buttons */
.share-row { display: flex; gap: 8px; flex-wrap: wrap; }
.share-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 999px;
  font-size: 14px; font-weight: 600;
  background: var(--paper);
  box-shadow: inset 0 0 0 1px var(--line);
  transition: transform .08s, background .15s;
}
.share-btn:hover { background: var(--cream-soft); }
.share-btn:active { transform: translateY(1px); }
.share-btn.wpp { background: #25D366; color: #fff; box-shadow: none; }
.share-btn.ig { background: linear-gradient(135deg, #F58529 0%, #DD2A7B 50%, #8134AF 100%); color: #fff; box-shadow: none; }
.share-btn.tt { background: var(--ink); color: #fff; box-shadow: none; }
.share-btn.copy { }

/* filters sidebar */
.filter-section { border-bottom: 1px solid var(--line); padding: 18px 0; }
.filter-section:last-child { border-bottom: none; }
.filter-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

/* checkbox */
.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; font-size: 14px; }
.checkbox-row input { accent-color: var(--ink); width: 16px; height: 16px; }
.checkbox-row .count { margin-left: auto; color: var(--muted); font-size: 12px; }

/* keyframes ribbon */
@keyframes scrollRibbon {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.ribbon-track {
  display: inline-flex;
  gap: 32px;
  animation: scrollRibbon 60s linear infinite;
  white-space: nowrap;
}

/* skeleton text underline highlight */
.highlight-coral { background: linear-gradient(transparent 60%, rgba(255,106,77,0.35) 60%); padding: 0 4px; }
.highlight-sun { background: linear-gradient(transparent 60%, rgba(255,196,47,0.5) 60%); padding: 0 4px; }
.highlight-turq { background: linear-gradient(transparent 60%, rgba(0,181,176,0.3) 60%); padding: 0 4px; }

/* dotted divider */
.dotted-div { border-top: 1px dashed var(--line); margin: 24px 0; }

/* sticky right column on tour detail */
@media (min-width: 960px) { .tour-sticky { position: sticky; top: 88px; } }

/* hide-scrollbar */
.no-scrollbar { scrollbar-width: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* ── Mobile responsive overrides ── */

/* Gallery mosaic: single-row 2-col on mobile */
@media (max-width: 640px) {
  .gallery-grid {
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: 160px 120px !important;
  }
  .gallery-grid > *:first-child {
    grid-row: 1 / 2 !important;
    grid-column: 1 / 3 !important;
  }
}
@media (min-width: 641px) and (max-width: 959px) {
  .gallery-grid {
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: 200px 140px !important;
  }
  .gallery-grid > *:first-child {
    grid-row: 1 / 2 !important;
    grid-column: 1 / 3 !important;
  }
}

/* Categories strip: 2 cols on small, 3 on medium */
@media (max-width: 480px) {
  .cats-grid { grid-template-columns: repeat(2, 1fr) !important; }
}

/* Tour/Search/Checkout multi-col grids → 1 col */
@media (max-width: 880px) {
  .search-grid { grid-template-columns: 1fr !important; }
  .filters-aside { display: none !important; }
  .mobile-filter-btn { display: inline-flex !important; }
  .checkout-grid { grid-template-columns: 1fr !important; }
  .checkout-grid .tour-sticky { position: static !important; }
}
@media (max-width: 960px) {
  .tour-grid { grid-template-columns: 1fr !important; }
  .include-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
  .reviews-grid { grid-template-columns: 1fr !important; }
  .why-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
  .about-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
  .mobile-book-bar { display: flex !important; }
  body { padding-bottom: 80px; }
  .fab-wpp { bottom: 88px !important; }
}

/* SectionTitle: stack title + action on small screens */
@media (max-width: 600px) {
  .section-title-row {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 12px !important;
  }
}

/* Footer grid: 2-col on tablet, 1-col on mobile */
@media (max-width: 600px) {
  .footer-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
}
@media (min-width: 601px) and (max-width: 880px) {
  .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
}

/* Trust strip: 2-col on mobile */
@media (max-width: 600px) {
  .trust-strip { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
}

/* Pillar cards in WhyBora: 1-col on very small */
@media (max-width: 420px) {
  .pillar-grid { grid-template-columns: 1fr !important; }
}

/* Hero search: always stack on mobile */
@media (max-width: 720px) {
  .hero-search { border-radius: 18px !important; flex-direction: column !important; padding: 8px !important; }
  .hero-search .divider { display: none !important; }
  .hero-search .field { border-radius: 12px !important; padding: 10px 14px !important; }
}

/* Share row: wrap tightly */
@media (max-width: 400px) {
  .share-row { gap: 6px !important; }
  .share-btn { padding: 8px 10px !important; font-size: 13px !important; }
}

/* Tour card share buttons: hide text on very small */
@media (max-width: 360px) {
  .card-share-text { display: none !important; }
}

/* Closing CTA rotated tag: simplify on mobile */
@media (max-width: 480px) {
  .cta-tag { transform: none !important; }
}

/* Form grids → single col */
@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr !important; }
  .pay-grid { grid-template-columns: 1fr !important; }
}

/* Tour booking card pax row on mobile */
@media (max-width: 480px) {
  .booking-card { padding: 18px !important; }
}

/* Prevent text overflow on very narrow screens */
@media (max-width: 360px) {
  .btn { padding: 10px 14px !important; font-size: 14px !important; }
  .btn-xl { padding: 14px 18px !important; }
  .chip { padding: 6px 10px !important; font-size: 12px !important; }
}

/* Order summary on mobile: comes after form */
@media (max-width: 880px) {
  .order-summary { order: -1; }
}

/* Prevent horizontal scroll */
body, #root { overflow-x: hidden; }

/* Ensure buttons and chips don't force horizontal scroll */
@media (max-width: 480px) {
  .btn-xl { padding: 14px 20px !important; font-size: 15px !important; }
  .btn-lg { padding: 13px 18px !important; font-size: 14px !important; }
}

/* Hero buttons wrap on mobile */
@media (max-width: 540px) {
  .hero-btns { flex-direction: column !important; }
  .hero-btns .btn { width: 100% !important; justify-content: center !important; }
  .cta-btns { flex-direction: column !important; }
  .cta-btns .btn { width: 100% !important; justify-content: center !important; }
}

/* Section padding on mobile */
@media (max-width: 640px) {
  section[style*="paddingTop: 80"] { padding-top: 48px !important; }
  section[style*="padding: \"80px"] { padding: 48px 0 !important; }
}

/* Booking card full width on mobile */
@media (max-width: 960px) {
  .booking-card { width: 100% !important; max-width: 480px; margin: 0 auto; }
}

/* Tour detail: hide sticky aside on mobile (mobile bar takes over) */
@media (max-width: 959px) {
  .tour-booking-aside { display: none !important; }
}
</style>

/* Header with hash routing */
const useHash = () => {
  const [hash, setHash] = React.useState(() => window.location.hash.slice(1) || "home");
  React.useEffect(() => {
    const onHash = () => {
      setHash(window.location.hash.slice(1) || "home");
      window.scrollTo({ top: 0, behavior: "instant" });
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return hash;
};

const FiltersPanel = ({ priceMax, setPriceMax, duration, setDuration, category, setCategory }) => {

  return (
    <div style={{ background: "var(--paper)", borderRadius: 18, padding: 24, boxShadow: "var(--shadow-sm)" }}>
      <h3 style={{ margin: "0 0 8px", fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
        <Icon name="filter" size={16}/> Filtros
      </h3>

      <div className="filter-section">
        <div className="filter-title">Precio máximo</div>
        <input type="range" min="50" max="500" step="10" value={priceMax} onChange={e=>setPriceMax(+e.target.value)} style={{ width: "100%", accentColor: "var(--coral)" }}/>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--muted)", marginTop: 4 }}>
          <span>R$ 50</span>
          <span style={{ fontWeight: 700, color: "var(--ink)" }}>Hasta R$ {priceMax}</span>
          <span>R$ 500+</span>
        </div>
      </div>

      <div className="filter-section">
        <div className="filter-title">Duración</div>
        {["Medio día", "Día completo", "Atardecer", "Privado"].map(d => (
          <label key={d} className="checkbox-row">
            <input type="checkbox" checked={duration.includes(d)} onChange={()=>toggle(duration, setDuration, d)}/>
            {d}
            <span className="count">{TOURS.filter(t=>t.tags.includes(d)).length}</span>
          </label>
        ))}
      </div>

      <div className="filter-section">
        <div className="filter-title">Categoría</div>
        {CATEGORIES.map(c => (
          <label key={c.id} className="checkbox-row">
            <input type="checkbox" checked={category.includes(c.id)} onChange={()=>toggle(category, setCategory, c.id)}/>
            <span style={{ marginRight: 4 }}>{c.glyph}</span>{c.name}
            <span className="count">{c.count}</span>
          </label>
        ))}
      </div>

      <div className="filter-section">
        <div className="filter-title">Vibe</div>
        {[
          { id: "familia", label: "Bora con niños", icon: "👨‍👩‍👧" },
          { id: "romantico", label: "Romántico", icon: "💞" },
          { id: "adrenalina", label: "Adrenalina", icon: "⚡" },
          { id: "sinsol", label: "Sin sol", icon: "🌧️" },
          { id: "gastro", label: "Gastronómico", icon: "🦪" },
        ].map(v => (
          <label key={v.id} className="checkbox-row">
            <input type="checkbox"/>
            <span>{v.icon}</span> {v.label}
          </label>
        ))}
      </div>

      <div className="filter-section">
        <div className="filter-title">Valoración mínima</div>
        {[4.8, 4.5, 4.0].map(r => (
          <label key={r} className="checkbox-row">
            <input type="radio" name="rating" style={{ accentColor: "var(--coral)" }}/>
            <Stars rating={r} size={13}/>
            <span style={{ marginLeft: 6, color: "var(--muted)", fontSize: 12 }}>y más</span>
          </label>
        ))}
      </div>

      <button style={{ marginTop: 16, fontSize: 13, color: "var(--coral)", fontWeight: 600 }}>Limpiar todos los filtros</button>
    </div>
  );
};

const QrPattern = () => {
  // simple decorative QR-like grid
  const rows = 12;
  const cols = 12;
  return (
    <svg viewBox={`0 0 ${cols} ${rows}`} width="100%" height="100%" style={{ display: "block" }}>
      {Array.from({ length: rows*cols }, (_, i) => {
        const r = Math.floor(i / cols);
        const c = i % cols;
        // deterministic pseudo-random
        const v = ((r*7 + c*3 + r*c) * 2654435761 >>> 0) % 100;
        if (v < 45) return <rect key={i} x={c} y={r} width="1" height="1" fill="var(--ink)"/>;
        return null;
      })}
      {/* corner markers */}
      {[[0,0],[0,9],[9,0]].map(([x,y],i)=>(
        <g key={i}>
          <rect x={x} y={y} width="3" height="3" fill="var(--ink)"/>
          <rect x={x+0.5} y={y+0.5} width="2" height="2" fill="#fff"/>
          <rect x={x+1} y={y+1} width="1" height="1" fill="var(--ink)"/>
        </g>
      ))}
    </svg>
  );
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    sun: "#E8B72F", moss: "#1F6B3A", sky: "#5BB298",
  },
};

const FONTS = {
  "Bricolage Grotesque": `"Bricolage Grotesque", system-ui, sans-serif`,
  "Instrument Serif": `"Instrument Serif", Georgia, serif`,
  "Space Grotesk": `"Space Grotesk", system-ui, sans-serif`,
  "DM Serif Display": `"DM Serif Display", Georgia, serif`,
};

// Make sure all display fonts are loaded
(() => {
  const link = document.createElement("link");
  link.rel = "stylesheet";
  link.href = "https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display&display=swap";
  document.head.appendChild(link);
})();

const parseHash = (hash) => {
  const [page, qs] = hash.split("?");
  const params = {};
  if (qs) {
    qs.split("&").forEach(p => {
      const [k, v] = p.split("=");
      params[k] = decodeURIComponent(v || "");
    });
  }
  return { page: page || "home", params };
};

const App = () => {
  const TWEAK_DEFAULTS = JSON.parse(document.getElementById("tweaks-defaults").textContent.match(/\/\*EDITMODE-BEGIN\*\/([\s\S]+)\/\*EDITMODE-END\*\//)[1]);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const hash = useHash();
  const { page, params } = parseHash(hash);

  // Apply palette tokens
  React.useEffect(() => {
    const p = PALETTES[tweaks.palette] || PALETTES.tropical;
    Object.entries(p).forEach(([k, v]) => {
      document.documentElement.style.setProperty(`--${k}`, v);
    });
    document.documentElement.style.setProperty("--font-display", FONTS[tweaks.displayFont] || FONTS["Bricolage Grotesque"]);
  }, [tweaks.palette, tweaks.displayFont]);

  // Density
  React.useEffect(() => {
    document.documentElement.style.setProperty("--density", tweaks.density === "compact" ? "0.85" : "1");
  }, [tweaks.density]);

  let view;
  switch (page) {
    case "search": view = <Search params={params} tweaks={tweaks}/>; break;
    case "tour": view = <Tour params={params} tweaks={tweaks}/>; break;
    case "checkout": view = <Checkout params={params} tweaks={tweaks}/>; break;
    case "about": view = <About/>; break;
    default: view = <Home tweaks={tweaks}/>;
  }

  return (
    <>
      <Header current={page}/>
      {view}
      {page !== "checkout" && <Footer/>}
      {page !== "tour" && <WhatsAppFab/>}

      <TweaksPanel title="Tweaks · Bora">
        <TweakSection label="Paleta" />
        <TweakColor
          label="Tema"
          value={PALETTES[tweaks.palette]?.coral}
          options={Object.keys(PALETTES).map(k => [PALETTES[k].coral, PALETTES[k].ink, PALETTES[k].sun, PALETTES[k].cream])}
          onChange={(_, i) => setTweak('palette', Object.keys(PALETTES)[i])}
        />
        <PaletteRadio current={tweaks.palette} onChange={(v) => setTweak('palette', v)}/>

        <TweakSection label="Tipografía" />
        <TweakRadio
          label="Display"
          value={tweaks.displayFont}
          options={["Bricolage Grotesque", "Instrument Serif", "Space Grotesk", "DM Serif Display"]}
          onChange={(v) => setTweak('displayFont', v)}
        />

        <TweakSection label="Layout" />
        <TweakRadio
          label="Densidad"
          value={tweaks.density}
          options={["cozy", "compact"]}
          onChange={(v) => setTweak('density', v)}
        />

        <TweakSection label="Social" />
        <TweakRadio
          label="Compartir"
          value={tweaks.shareEmphasis}
          options={["loud", "quiet"]}
          onChange={(v) => setTweak('shareEmphasis', v)}
        />

        <TweakSection label="Navegar" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 4 }}>
          {[
            { id: "home", label: "Home" },
            { id: "search", label: "Tours" },
            { id: `tour?id=${TOURS[1].id}`, label: "Detalle" },
            { id: `checkout?id=${TOURS[1].id}`, label: "Checkout" },
            { id: "about", label: "Nosotros" },
          ].map(n => (
            <button key={n.id} onClick={() => navTo(n.id)} style={{
              padding: "8px 10px", borderRadius: 8, fontSize: 11.5, fontWeight: 600,
              background: "rgba(0,0,0,0.06)", color: "#29261b", textAlign: "left",
            }}>
              → {n.label}
            </button>
          ))}
        </div>
      </TweaksPanel>
    </>
  );
};

const PaletteRadio = ({ current, onChange }) => {
  const labels = {
    tropical: "Tropical",
    sunset: "Atardecer",
    ocean: "Atlántico",

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
        {Object.keys(PALETTES).map(k => (
          <button key={k} onClick={() => onChange(k)} style={{
            padding: "8px", borderRadius: 8, fontSize: 11, fontWeight: 600,
